[models.scripted]
provider = "scripted"

[models.hc_bench_oracle]
provider = "hc-bench-oracle"

[models.openai_codex]
provider = "openai-codex"
model = "your-codex-model-name"
base_url = "https://your-openai-compatible-endpoint.example/v1"
api_key_env = "OPENAI_API_KEY"
timeout = 60
max_output_tokens = 1200
# Optional for provider = "openai-codex": none, minimal, low, medium, high, xhigh.
# "minimal" is sent as "low" for Responses API compatibility.
reasoning_effort = "high"

[models.deepseek]
provider = "openai-chat"
model = "deepseek-v4-pro"
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
timeout = 120
max_output_tokens = 2000
